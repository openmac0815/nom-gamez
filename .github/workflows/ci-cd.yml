name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: nomgamez-backend/package-lock.json

    - name: Install dependencies
      working-directory: ./nomgamez-backend
      run: npm ci

    - name: Run linter
      working-directory: ./nomgamez-backend
      run: npm run lint || echo "Linter not configured, skipping"

    - name: Run tests
      working-directory: ./nomgamez-backend
      run: npm test
      env:
        NODE_ENV: test
        # Use test environment variables
        PLATFORM_SEED: test_seed_123
        PLATFORM_ADDRESS: z1test_address_123
        BTC_DEPOSIT_ADDRESS: bc1qtest_address_123
        ZNN_NODE_URL: wss://test.zenon.fun:35998
        PORT: 3001
        HOST: 127.0.0.1

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/nom-gamez:latest
          ghcr.io/${{ github.repository }}/nom-gamez:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Deploy to production
      run: |
        echo "Add your deployment steps here (e.g., SSH to server, docker-compose pull, restart)"
        # Example:
        # ssh user@server "cd /path/to/nom-gamez && docker-compose pull && docker-compose up -d"
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        SERVER_HOST: ${{ secrets.SERVER_HOST }}
