version: '3.8'

services:
  # Zenon Node (local znn node)
  zenon-node:
    image: eove7kj/znnd:latest
    container_name: zenon-node
    ports:
      - "35998:35998"
      - "35999:35999"
    volumes:
      - zenon-data:/root/.znn
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "znn-cli", "getinfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Bitcoin Node (local btc node)
  bitcoin-node:
    image: kylemanna/bitcoind:latest
    container_name: bitcoin-node
    ports:
      - "8332:8332"
      - "8333:8333"
    volumes:
      - bitcoin-data:/bitcoin/.bitcoin
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bitcoin-cli", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # NOM-GAMEZ Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      # Override these in .env or with environment section
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      # These should be set in nomgamez-backend/.env (mounted as volume)
    volumes:
      # Mount .env file (not in image for security)
      - ./nomgamez-backend/.env:/app/.env:ro
      # Persist data (markets, positions, sessions)
      - ./nomgamez-backend/data:/app/data
    depends_on:
      - redis
      - zenon-node
      - bitcoin-node
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (res) => {process.exit(res.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Redis for session storage (optional, falls back to in-memory)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Nginx to serve frontend and proxy API requests
  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nom-gamez.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis-data:
  zenon-data:
  bitcoin-data:
